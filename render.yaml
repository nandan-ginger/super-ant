services:
  - type: web
    name: superant-backend
    env: node
    plan: free
    buildCommand: "npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Prompt user to input their MongoDB connection string during deployment (e.g. from MongoDB Atlas)
      - key: JWT_SECRET
        generateValue: true # Auto-generates a secure JWT secret
      - key: SERVER_BASE_URL
        sync: false # Prompt user to input their Render external URL or custom domain during deployment
      - key: GEMINI_API_KEY
        sync: false # Prompt user to input during deployment
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-2
      - key: GEMINI_TTS_MODEL
        value: gemini-3.1-flash-tts-preview
      - key: CORS_ORIGIN
        value: "*"
      - key: SESSION_TTL_MINUTES
        value: "30"
      - key: RAG_DIRECT_LIMIT
        value: "5000"
      - key: RAG_CHUNK_LIMIT
        value: "50000"
      - key: RAG_TOP_K
        value: "5"
      - key: LEADS_API_KEY
        generateValue: true # Auto-generates a secure API key for the leads API
